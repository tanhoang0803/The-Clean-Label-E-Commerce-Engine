name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Backend: install → migrate → test ─────────────────────────────────────
  backend:
    name: Backend — Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clean_label_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run DB migration
        env:
          PGPASSWORD: test_password
        run: psql -h localhost -U postgres -d clean_label_test -f db/migrations/001_init.sql

      - name: Run tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/clean_label_test
          JWT_SECRET: ci_test_secret_do_not_use_in_prod
          # Real keys not needed — OpenAI and Stripe are mocked in tests
          OPENAI_API_KEY: sk-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          FRONTEND_URL: http://localhost:3000
        run: npm test

  # ── 2. Frontend: install → build ─────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          REACT_APP_STRIPE_PUBLIC_KEY: pk_test_placeholder
          # Suppress CRA interactive mode in CI
          CI: false
        run: npm run build

  # ── 3. Docker: verify compose builds cleanly ──────────────────────────────────
  docker:
    name: Docker — Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        env:
          OPENAI_API_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          REACT_APP_STRIPE_PUBLIC_KEY: placeholder
          POSTGRES_PASSWORD: placeholder
          JWT_SECRET: placeholder
        run: docker compose build --no-cache

  # ── 4. Deploy to Render (only on push to main) ────────────────────────────────
  deploy:
    name: Deploy — Render
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      BACKEND_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      FRONTEND_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}

    steps:
      - name: Trigger Render backend deploy
        run: |
          if [ -n "$BACKEND_HOOK" ]; then
            curl -s -X POST "$BACKEND_HOOK" -o /dev/null -w "Backend deploy triggered: %{http_code}\n"
          else
            echo "RENDER_BACKEND_DEPLOY_HOOK not set — skipping backend deploy."
          fi

      - name: Trigger Render frontend deploy
        run: |
          if [ -n "$FRONTEND_HOOK" ]; then
            curl -s -X POST "$FRONTEND_HOOK" -o /dev/null -w "Frontend deploy triggered: %{http_code}\n"
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK not set — skipping frontend deploy."
          fi
